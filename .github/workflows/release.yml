name: Build & Release

# Baut Standalone-Builds fuer Linux (AppImage) und Windows (.exe im ZIP).
# Loest aus bei Version-Tags (v*) -> haengt die Artefakte an ein GitHub-Release.
# Zusaetzlich manuell startbar (Actions-Tab) zum Testen ohne Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write  # noetig, damit der release-Job das Release anlegen darf

jobs:
  # --- Linux: PyInstaller-Bundle -> AppImage --------------------------------
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Qt-Laufzeitbibliotheken (fuer PyInstaller-Analyse)
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Build-Tools installieren
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: PyInstaller (onedir)
        run: |
          pyinstaller --noconfirm --windowed --name mdviewplus \
            --collect-data mdviewplus \
            packaging/pyinstaller/mdviewplus_entry.py

      - name: AppImage packen
        run: bash packaging/appimage/build-appimage.sh mdviewplus-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: mdviewplus-x86_64.AppImage
          if-no-files-found: error

  # --- Windows: PyInstaller-Bundle -> ZIP -----------------------------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build-Tools installieren
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller pillow

      - name: Icon nach .ico wandeln
        run: python packaging/pyinstaller/make_ico.py

      - name: PyInstaller (onedir)
        run: >
          pyinstaller --noconfirm --windowed --name mdviewplus
          --icon packaging/mdviewplus.ico
          --collect-data mdviewplus
          packaging/pyinstaller/mdviewplus_entry.py

      - name: ZIP packen
        run: Compress-Archive -Path dist/mdviewplus -DestinationPath mdviewplus-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: mdviewplus-windows-x64.zip
          if-no-files-found: error

  # --- Linux: schlankes natives .deb (setzt auf apt-Qt auf) -----------------
  deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: .deb bauen
        run: bash packaging/deb/build-deb.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: "*.deb"
          if-no-files-found: error

  # --- Release: nur bei Tags, haengt alle Artefakte an ----------------------
  release:
    needs: [linux, windows, deb]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
      - name: GitHub-Release anlegen
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-appimage/mdviewplus-x86_64.AppImage
            linux-deb/*.deb
            windows-zip/mdviewplus-windows-x64.zip
          generate_release_notes: true
